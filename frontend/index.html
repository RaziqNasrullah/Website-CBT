<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT App — Computer Based Test</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        colors: { ink: '#0f172a' }
      }
    }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 0; }
  .table-cell { padding: 0.6rem 0.85rem; border-bottom: 1px solid #e2e8f0; }
  .badge { display: inline-block; padding: 0.15rem 0.6rem; font-size: 0.75rem; font-weight: 600; border: 1px solid; }
  .btn { padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 600; border: 1px solid transparent; transition: background-color .12s; cursor: pointer; }
  .btn-primary { background: #0f172a; color: #fff; }
  .btn-primary:hover { background: #1e293b; }
  .btn-outline { background: #fff; color: #0f172a; border-color: #cbd5e1; }
  .btn-outline:hover { background: #f1f5f9; }
  .btn-danger { background: #fff; color: #b91c1c; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }
  .input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #cbd5e1; font-size: 0.9rem; background: #fff; }
  .input:focus { outline: 2px solid #0f172a; outline-offset: -1px; }
  .card { background: #fff; border: 1px solid #e2e8f0; }
  .label { display:block; font-size: 0.8rem; font-weight: 600; color: #334155; margin-bottom: 0.25rem; }
</style>
</head>
<body class="bg-slate-50 text-ink min-h-screen">

<div id="toast-root" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
<div id="app" class="min-h-screen"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
